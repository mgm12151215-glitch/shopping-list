<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="買い物リスト">
<title>買い物リスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#7ec4ae;--accent-light:#f2faf7;--accent-border:#b8ddd0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:40px}
.app{max-width:480px;margin:0 auto;padding:1rem}
#view-list{border-radius:16px;padding:1rem;background:var(--accent-light);margin:-1rem;margin-top:0;padding-top:1rem}
#view-calc{border-radius:16px;padding:1rem;background:var(--accent-light);margin:-1rem;margin-top:0;padding-top:1rem}
.main-tabs{display:flex;gap:10px;margin-bottom:1.2rem}
.main-tab{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;border-radius:28px;border:0.5px solid #ccc;background:#f0f0f0;color:#666;font-size:15px;cursor:pointer;font-weight:400;transition:background .18s,color .18s,border-color .18s;flex:1}
.tab-icon{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#ffffff;border:1px solid #e8e8e8}
.tab-icon img{width:100%;height:100%;object-fit:cover;object-position:center;border-radius:50%;display:block}
#main-tab-list.active{background:#7ec4ae;border-color:#7ec4ae;color:#fff;font-weight:500}
#main-tab-calc.active{background:#7da0d4;border-color:#7da0d4;color:#fff;font-weight:500}
.tabs-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px}
.tab{padding:9px 18px;border-radius:22px;border:0.5px solid #ccc;background:transparent;color:#666;font-size:15px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab.active{background:var(--accent-light);color:#333;border-color:var(--accent);font-weight:500}
.tab-add{width:34px;height:34px;border-radius:50%;border:0.5px dashed #ccc;background:transparent;color:#aaa;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cat-name-input{font-size:14px;font-weight:500;color:#333;border:none;background:transparent;outline:none;flex:1;min-width:0}
.cat-name-input:focus{border-bottom:1px solid #ccc}
.cat-count{font-size:13px;color:#aaa;white-space:nowrap}
.header-btns{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.icon-btn{font-size:13px;padding:4px 10px;border-radius:8px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer;white-space:nowrap}
.icon-btn.danger{color:#A32D2D;border-color:#F7C1C1}
.item-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px;transition:background .2s,border-color .2s}
.item-card.focused{background:#f5f2fa;border-color:#c9b8e8}
.item-card.checked{opacity:0.4}
.item-card.checked .item-name-input{text-decoration:line-through}
.move-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.move-btn{width:30px;height:30px;border-radius:8px;border:0.5px solid #ddd;background:transparent;color:#aaa;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.move-btn:disabled{opacity:0.2;cursor:default}
.priority-badge{width:28px;height:28px;border-radius:50%;border:0.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0}
.priority-badge.high{background:#FAEEDA;border-color:#FAC775;color:#854F0B}
.priority-badge.mid{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5}
.priority-badge.low{background:#f5f5f5;color:#aaa}
.item-body{flex:1;min-width:0}
.item-name-input{font-size:16px;font-weight:500;color:#333;border:none;background:transparent;outline:none;width:100%}
.item-name-input:focus{border-bottom:1px solid #ccc}
.item-meta-input{font-size:12px;color:#aaa;border:none;background:transparent;outline:none;width:100%;margin-top:3px}
.item-meta-input::placeholder{color:#ccc}
.item-right{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.bulk-btn{width:36px;height:36px;border-radius:8px;border:0.5px solid #ddd;background:transparent;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.3;transition:opacity .15s,border-color .15s}
.bulk-btn.on{opacity:1;border-color:#c9b8e8}
.check-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #ccc;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center}
.check-btn.done{background:#1D9E75;border-color:#1D9E75}
.check-icon{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.del-item-btn{font-size:14px;color:#ccc;cursor:pointer;border:none;background:transparent;line-height:1;padding:0 2px}
.add-item-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;border:0.5px dashed #ccc;cursor:pointer;color:#aaa;font-size:13px;margin-top:4px;background:#fff}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.done-sep{font-size:12px;color:#aaa;margin:12px 0 6px;padding-left:4px}

.cat-add-panel{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem;margin-bottom:1rem;display:flex;gap:8px;align-items:center}
.cat-add-panel input{flex:1;padding:7px 10px;border-radius:8px;border:0.5px solid #ddd;background:#f5f5f5;color:#333;font-size:14px;outline:none}
.cat-add-panel button{padding:7px 14px;border-radius:8px;border:0.5px solid #ddd;background:#f5f5f5;color:#333;font-size:13px;cursor:pointer;white-space:nowrap}
.calc-intro{font-size:13px;color:#666;margin-bottom:1rem;line-height:1.6}
.unit-row{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.unit-row label{font-size:13px;color:#666}
.unit-pills{display:flex;gap:6px;flex-wrap:wrap}
.unit-pill{padding:5px 12px;border-radius:16px;border:0.5px solid #ccc;background:transparent;color:#666;font-size:12px;cursor:pointer;transition:all .12s}
.unit-pill.active{background:#7da0d4;border-color:#7da0d4;color:#fff;font-weight:500}
.product-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.product-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:12px 14px;transition:border-color .2s,background .2s}
.product-card.winner{border-color:#a8d4c6;background:#f0f7f4}
.product-card.loser{opacity:0.6}
.product-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.product-num{width:22px;height:22px;border-radius:50%;background:#f5f5f5;border:0.5px solid #ddd;font-size:11px;font-weight:500;color:#666;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.product-card.winner .product-num{background:#c8e6dc;border-color:#a8d4c6;color:#2d6b55}
.product-name-input{flex:1;font-size:13px;font-weight:500;color:#333;border:none;background:transparent;outline:none}
.product-name-input:focus{border-bottom:1px solid #ccc}
.del-product-btn{font-size:16px;color:#ccc;cursor:pointer;border:none;background:transparent;padding:0 2px}
.product-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-wrap{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:11px;color:#aaa}
.field-input-wrap{display:flex;align-items:center;gap:4px;background:#f5f5f5;border:0.5px solid #ddd;border-radius:8px;padding:6px 8px}
.field-input{flex:1;font-size:14px;color:#333;border:none;background:transparent;outline:none;min-width:0;text-align:right}
.field-unit{font-size:12px;color:#aaa;white-space:nowrap}
.unit-price-row{margin-top:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.unit-price-label{font-size:12px;color:#888}
.unit-price-val{font-size:15px;font-weight:500;color:#333}
.product-card.winner .unit-price-val{color:#2d6b55}
.winner-badge{font-size:11px;background:#c8e6dc;color:#2d6b55;border-radius:10px;padding:2px 8px;border:0.5px solid #a8d4c6;margin-left:6px}
.add-product-btn{width:100%;padding:10px;border-radius:12px;border:0.5px dashed #ccc;background:#fff;color:#aaa;font-size:13px;cursor:pointer;margin-bottom:1rem}
.result-box{background:#f5f5f5;border-radius:12px;padding:1rem 1.2rem;font-size:13px;color:#666;line-height:1.7;min-height:48px}
.result-box .winner-name{font-weight:500;color:#2d6b55}
.result-box .diff{color:#333;font-weight:500}
.reset-btn{width:100%;margin-top:10px;padding:8px;border-radius:12px;border:0.5px solid #ddd;background:transparent;color:#aaa;font-size:12px;cursor:pointer}
@keyframes runAcross{
  0%{right:-80px;opacity:1}
  100%{right:120%;opacity:1}
}
.run-mascot{position:fixed;bottom:80px;right:-80px;width:70px;height:70px;border-radius:50%;overflow:hidden;background:#fff;border:2px solid #e8e8e8;z-index:9999;pointer-events:none;animation:runAcross 2.8s ease-in-out forwards;-webkit-animation:runAcross 2.8s ease-in-out forwards}
.run-mascot img{width:100%;height:100%;object-fit:cover;border-radius:50%;transform:scaleX(-1)}
</style>
</head>
<body>
<div class="app">
  <div class="main-tabs">
    <button class="main-tab active" id="main-tab-list" onclick="switchMain('list')">
      <span class="tab-icon"><img id="img-list" alt="リスト" /></span>
      リスト
    </button>
    <button class="main-tab" id="main-tab-calc" onclick="switchMain('calc')">
      <span class="tab-icon"><img id="img-calc" alt="単価計算" /></span>
      単価計算
    </button>
  </div>
  <div id="view-list">
    <div class="tabs-row" id="tabs-row"></div>
    <div id="cat-add-area"></div>
    <div id="section-header"></div>
    <div id="list"></div>
  </div>
  <div id="view-calc" style="display:none">
    <p class="calc-intro">容量と価格を入力すると、1単位あたりの単価を自動計算してどれがお得か比べられます。</p>
    <div class="unit-row">
      <label>単位：</label>
      <div class="unit-pills" id="unit-pills"></div>
    </div>
    <div class="product-cards" id="product-cards"></div>
    <button class="add-product-btn" onclick="addProduct()">+ 商品を追加（最大5つ）</button>
    <div class="result-box" id="result-box">商品を2つ以上入力すると結果が出ます</div>
    <button class="reset-btn" onclick="resetCalc()">リセット</button>
  </div>
</div>

  {id:2,name:"バス・洗面",items:[
    {id:1,name:"シャンプー",meta:"詰め替え 1000ml",priority:"high",bulk:true,bought:false},
    {id:2,name:"コンディショナー",meta:"詰め替え",priority:"high",bulk:false,bought:false},
    {id:3,name:"ボディソープ",meta:"",priority:"mid",bulk:false,bought:false},
    {id:4,name:"石鹸",meta:"",priority:"low",bulk:false,bought:true},
  ]},
  {id:3,name:"洗濯・掃除",items:[
    {id:5,name:"洗濯洗剤",meta:"液体 大容量",priority:"high",bulk:true,bought:false},
    {id:6,name:"柔軟剤",meta:"",priority:"mid",bulk:false,bought:false},
    {id:7,name:"トイレットペーパー",meta:"12ロール×2",priority:"high",bulk:true,bought:false},
  ]},
  {id:4,name:"キッチン",items:[
    {id:8,name:"食器用洗剤",meta:"",priority:"mid",bulk:false,bought:false},
    {id:9,name:"ラップ",meta:"",priority:"low",bulk:false,bought:false},
  ]},
];
let currentCat=0,nextId=200,nextCatId=10,addingCat=false;
const PL={high:"↑",mid:"→",low:"↓"},PC={high:"mid",mid:"low",low:"high"};
let products=[{id:1,name:"商品A",amount:"",price:""},{id:2,name:"商品B",amount:"",price:""}];
let nextPid=3;

window.addEventListener('load',function(){
  document.getElementById("img-list").src="data:image/png;base64,"+DOG;
  document.getElementById("img-calc").src="data:image/png;base64,"+CAT;
  switchMain('list');
});

function switchMain(tab){
  document.getElementById("view-list").style.display=tab==="list"?"block":"none";
  document.getElementById("view-calc").style.display=tab==="calc"?"block":"none";
  document.getElementById("main-tab-list").className="main-tab"+(tab==="list"?" active":"");
  document.getElementById("main-tab-calc").className="main-tab"+(tab==="calc"?" active":"");
  const root=document.documentElement;
  if(tab==="list"){
    root.style.setProperty("--accent","#7ec4ae");
    root.style.setProperty("--accent-light","#f2faf7");
    root.style.setProperty("--accent-border","#b8ddd0");
  } else {
    root.style.setProperty("--accent","#7da0d4");
    root.style.setProperty("--accent-light","#f0f4fb");
    root.style.setProperty("--accent-border","#90aad4");
  }
  if(tab==="calc")calcRender();
}
function renderUnitPills(){
  document.getElementById("unit-pills").innerHTML=UNITS.map(u=>"<button class='unit-pill"+(selectedUnit===u?" active":"")+"' onclick='selectUnit(\""+u+"\")'>" +u+"</button>").join("");
}
function selectUnit(u){selectedUnit=u;renderUnitPills();calcRender();}
function calcRender(){
  renderUnitPills();
  const unit=selectedUnit;
  const unitPrices=products.map(p=>{const a=parseFloat(p.amount),pr=parseFloat(p.price);return(a>0&&pr>0)?pr/a:null;});
  const valid=unitPrices.filter(v=>v!==null);
  const minPrice=valid.length>0?Math.min(...valid):null;
  const winnerIdx=minPrice!==null?unitPrices.indexOf(minPrice):-1;
  document.getElementById("product-cards").innerHTML=products.map((p,i)=>{
    const up=unitPrices[i];
    const isWinner=i===winnerIdx&&valid.length>=2;
    const isLoser=winnerIdx!==-1&&!isWinner&&up!==null&&valid.length>=2;
    const upStr=up!==null?"¥"+up.toFixed(2)+" / "+unit:"—";
    return "<div class='product-card"+(isWinner?" winner":"")+(isLoser?" loser":"")+"'>"
      +"<div class='product-card-header'><div class='product-num'>"+(i+1)+"</div>"
      +"<input class='product-name-input' value='"+p.name+"' placeholder='商品名（任意）' oninput=\"updateProduct("+p.id+",'name',this.value)\" />"
      +(products.length>2?"<button class='del-product-btn' onclick='delProduct("+p.id+")'>×</button>":"")
      +"</div><div class='product-fields'>"
      +"<div class='field-wrap'><span class='field-label'>容量</span><div class='field-input-wrap'><input class='field-input' type='number' min='0' value='"+p.amount+"' placeholder='0' oninput=\"updateProduct("+p.id+",'amount',this.value);calcRender()\" /><span class='field-unit'>"+unit+"</span></div></div>"
      +"<div class='field-wrap'><span class='field-label'>価格</span><div class='field-input-wrap'><span class='field-unit'>¥</span><input class='field-input' type='number' min='0' value='"+p.price+"' placeholder='0' oninput=\"updateProduct("+p.id+",'price',this.value);calcRender()\" /></div></div>"
      +"</div><div class='unit-price-row'><span class='unit-price-label'>1"+unit+"あたり</span><span class='unit-price-val'>"+upStr+(isWinner?"<span class='winner-badge'>いちばんお得</span>":"")+"</span></div></div>";
  }).join("");
  const box=document.getElementById("result-box");
  if(valid.length<2){box.innerHTML="商品を2つ以上入力すると結果が出ます";return;}
  const winner=products[winnerIdx];const winnerUp=unitPrices[winnerIdx];
  const otherPrices=unitPrices.filter((_,i)=>i!==winnerIdx&&unitPrices[i]!==null);
  const maxUp=otherPrices.length>0?Math.max(...otherPrices):0;
  const diffPct=maxUp>0?((maxUp-winnerUp)/maxUp*100).toFixed(0):0;
  box.innerHTML="<span class='winner-name'>「"+(winner.name||"商品"+(winnerIdx+1))+"」</span>がいちばんお得です。1"+unit+"あたり <span class='diff'>¥"+winnerUp.toFixed(2)+"</span> で、他の商品より最大 <span class='diff'>"+diffPct+"%</span> 安くなっています。";
}
function updateProduct(id,key,val){const p=products.find(x=>x.id===id);if(p)p[key]=val;}
function addProduct(){if(products.length>=5)return;const labels=["A","B","C","D","E"];products.push({id:nextPid++,name:"商品"+labels[products.length],amount:"",price:""});calcRender();}
function delProduct(id){if(products.length<=2)return;products=products.filter(p=>p.id!==id);calcRender();}
function resetCalc(){products=[{id:nextPid++,name:"商品A",amount:"",price:""},{id:nextPid++,name:"商品B",amount:"",price:""}];calcRender();}
function render(){renderTabs();renderHeader();renderList();}
function renderTabs(){
  const row=document.getElementById("tabs-row");
  row.innerHTML=cats.map((c,i)=>"<button class='tab"+(i===currentCat?" active":"")+"' onclick='switchCat("+i+")'>"+(c.name||"（未入力）")+"</button>").join("")+"<button class='tab-add' onclick='toggleCatAdd()'>+</button>";
  const addArea=document.getElementById("cat-add-area");
  if(addingCat){addArea.innerHTML="<div class='cat-add-panel'><input id='new-cat-input' placeholder='新しいカテゴリ名...' /><button onclick='confirmAddCat()'>追加</button><button onclick='cancelCatAdd()'>キャンセル</button></div>";document.getElementById("new-cat-input").focus();}
  else{addArea.innerHTML="";}
}
function renderHeader(){
  const cat=cats[currentCat];const remaining=cat.items.filter(i=>!i.bought).length;
  document.getElementById("section-header").innerHTML="<div class='section-header'><input class='cat-name-input' value='"+cat.name+"' placeholder='カテゴリ名' oninput='renameCat(this.value)' /><span class='cat-count'>"+remaining+"品</span><div class='header-btns'><button class='icon-btn' onclick='addItem()'>+ 追加</button><button class='icon-btn danger' onclick='deleteCat()'>削除</button></div></div>";
}
function renderList(){
  const cat=cats[currentCat];
  const pending=cat.items.filter(i=>!i.bought);const done=cat.items.filter(i=>i.bought);
  let html="";
  if(pending.length===0&&done.length===0)html="<div class='empty'>商品がありません<br><span style='font-size:12px'>「+ 追加」で追加できます</span></div>";
  pending.forEach((it,idx)=>{html+=itemHTML(it,idx,pending.length,false);});
  if(done.length>0){html+="<div class='done-sep'>購入済み</div>";done.forEach((it,idx)=>{html+=itemHTML(it,idx,done.length,true);});}
  html+="<div class='add-item-row' onclick='addItem()'><span style='font-size:16px;line-height:1'>+</span> 商品を追加</div>";
  document.getElementById("list").innerHTML=html;
}
function itemHTML(it,idx,total,isDone){
  const checkInner=it.bought?"<svg class='check-icon' viewBox='0 0 12 12'><polyline points='2,6 5,9 10,3'/></svg>":"";
  const sec=isDone?"done":"pending";
  const focusFns="onfocus='this.closest(\".item-card\").classList.add(\"focused\")' onblur='this.closest(\".item-card\").classList.remove(\"focused\")'";
  return "<div class='item-card"+(it.bought?" checked":"")+"'>"
    +"<div class='move-btns'><button class='move-btn' onclick='moveItem("+it.id+",\""+sec+"\",-1)' "+(idx===0?"disabled":"")+">▲</button><button class='move-btn' onclick='moveItem("+it.id+",\""+sec+"\",1)' "+(idx===total-1?"disabled":"")+">▼</button></div>"
    +"<div class='priority-badge "+it.priority+"' onclick='cyclePri("+it.id+")'>"+PL[it.priority]+"</div>"
    +"<div class='item-body'><input class='item-name-input' value='"+it.name+"' placeholder='商品名' oninput='renameItem("+it.id+",this.value)' "+focusFns+" "+(it.bought?"disabled":"")+" /><input class='item-meta-input' value='"+it.meta+"' placeholder='メモ' oninput='updateMeta("+it.id+",this.value)' "+focusFns+" "+(it.bought?"disabled":"")+" /></div>"
    +"<div class='item-right'>"
    +"<button class='check-btn"+(it.bought?" done":"")+"' onclick='toggleBought("+it.id+")'>"+checkInner+"</button>"
    +"<div style='display:flex;align-items:center;gap:4px'>"
    +"<button class='bulk-btn"+(it.bulk?" on":"")+"' onclick='toggleBulk("+it.id+")'>📦</button>"
    +"<button class='del-item-btn' onclick='deleteItem("+it.id+")'>×</button>"
    +"</div>"
    +"</div></div>";
}
function moveItem(id,section,dir){
  const cat=cats[currentCat];const group=cat.items.filter(i=>section==="done"?i.bought:!i.bought);
  const gi=cat.items.findIndex(i=>i.id===id);const tgt=group[group.findIndex(i=>i.id===id)+dir];
  if(!tgt)return;const ti=cat.items.findIndex(i=>i.id===tgt.id);
  const tmp=cat.items[gi];cat.items[gi]=cat.items[ti];cat.items[ti]=tmp;renderHeader();renderList();
}
function switchCat(i){currentCat=i;addingCat=false;render();}
function renameCat(v){cats[currentCat].name=v;renderTabs();}
function deleteCat(){
  if(cats.length<=1){alert("最後のカテゴリは削除できません");return;}
  if(!confirm("「"+cats[currentCat].name+"」を削除しますか？"))return;
  cats.splice(currentCat,1);if(currentCat>=cats.length)currentCat=cats.length-1;render();
}
function toggleCatAdd(){addingCat=!addingCat;renderTabs();}
function cancelCatAdd(){addingCat=false;renderTabs();}
function confirmAddCat(){
  const name=(document.getElementById("new-cat-input").value.trim())||"新カテゴリ";
  cats.push({id:nextCatId++,name,items:[]});currentCat=cats.length-1;addingCat=false;render();
}
function addItem(){
  cats[currentCat].items.unshift({id:nextId++,name:"",meta:"",priority:"mid",bulk:false,bought:false});
  renderHeader();renderList();const inputs=document.querySelectorAll(".item-name-input");if(inputs[0])inputs[0].focus();
}
function renameItem(id,v){const it=find(id);if(it)it.name=v;}
function updateMeta(id,v){const it=find(id);if(it)it.meta=v;}
function deleteItem(id){for(const c of cats){const i=c.items.findIndex(x=>x.id===id);if(i!==-1){c.items.splice(i,1);break;}}renderHeader();renderList();}
function cyclePri(id){const it=find(id);it.priority=PC[it.priority];renderHeader();renderList();}
function toggleBought(id){
  const it=find(id);
  const wasBought=it.bought;
  it.bought=!it.bought;
  if(!wasBought) runMascot();
  renderHeader();renderList();
}
function runMascot(){
  const existing=document.querySelector(".run-mascot");
  if(existing)existing.remove();
  const el=document.createElement("div");
  el.className="run-mascot";
  const img=document.createElement("img");
  img.src=Math.random()<0.5
    ?"data:image/png;base64,"+DOG
    :"data:image/png;base64,"+CAT;
  el.appendChild(img);
  document.body.appendChild(el);
  el.addEventListener("animationend",()=>el.remove());
}
function toggleBulk(id){const it=find(id);it.bulk=!it.bulk;renderList();}
function find(id){for(const c of cats)for(const i of c.items)if(i.id===id)return i;return null;}
render();
</script>
</body>
</html>
